{% extends "base.html" %}
{% block title %}Restablecer contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center col-md-6 mx-auto">
    <h1 class="h3 mb-4">Restablecer contraseña</h1>
    <p class="text-muted">Ingresa tu correo. Recibirás un enlace (en consola si DEBUG está activo).</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_email">Correo electrónico</label>
            <input type="email" name="email" class="form-control" id="id_email" required>
        </div>
        <button type="submit" class="btn btn-primary">Enviar enlace</button>
    </form>
</div>
{% endblock %}
