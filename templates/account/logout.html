{% extends "base.html" %}

{% block title %}Cerrar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-md-6">
        <h1 class="h3">¿Cerrar sesión?</h1>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, cerrar sesión</button>
            <a href="{% url 'campaigns:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
