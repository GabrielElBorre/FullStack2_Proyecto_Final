{% extends "base.html" %}

{% block title %}Donar a {{ campana.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-3">Donar a: {{ campana.nombre }}</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">Confirmar donación</button>
            <a href="{{ campana.get_absolute_url }}" class="btn btn-link">Volver</a>
        </form>
    </div>
</div>
{% endblock %}
