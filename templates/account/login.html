{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="h3 mb-4">Iniciar sesión</h1>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
            {% endif %}
            <div class="mb-3">
                <label class="form-label" for="id_username">Correo electrónico</label>
                <input type="email" name="username" class="form-control" id="id_username" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="id_password">Contraseña</label>
                <input type="password" name="password" class="form-control" id="id_password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p class="mt-3 text-center">
            <a href="{% url 'accounts:password_reset' %}">¿Olvidaste tu contraseña?</a>
        </p>
        <p class="text-center">
            <a href="{% url 'accounts:signup' %}">Crear cuenta nueva</a>
        </p>
    </div>
</div>
{% endblock %}
